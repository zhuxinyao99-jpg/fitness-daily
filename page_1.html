<script>
    document.addEventListener("DOMContentLoaded", () => {
        // 1. Timer Logic
        let totalSeconds = 42;
        let isRunning = true;
        let timerInterval = null;

        const timerDisplay = document.querySelector('h1.font-headline');
        const playPauseBtn = document.querySelector('.fixed.bottom-24.right-6 button');
        const playPauseIcon = playPauseBtn.querySelector('span');

        function formatTime(secs) {
            const m = Math.floor(secs / 60).toString().padStart(2, '0');
            const s = (secs % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        function toggleTimer() {
            if (isRunning) {
                // Pause
                clearInterval(timerInterval);
                playPauseIcon.textContent = 'play_arrow';
                playPauseBtn.classList.replace('bg-tertiary-container', 'bg-surface-variant');
                playPauseBtn.classList.replace('text-on-tertiary-container', 'text-on-surface');
            } else {
                // Play
                timerInterval = setInterval(() => {
                    totalSeconds++;
                    timerDisplay.textContent = formatTime(totalSeconds);
                }, 1000);
                playPauseIcon.textContent = 'pause';
                playPauseBtn.classList.replace('bg-surface-variant', 'bg-tertiary-container');
                playPauseBtn.classList.replace('text-on-surface', 'text-on-tertiary-container');
            }
            isRunning = !isRunning;
        }

        // Start initial running exactly like the UI
        timerInterval = setInterval(() => {
            totalSeconds++;
            timerDisplay.textContent = formatTime(totalSeconds);
        }, 1000);

        playPauseBtn.addEventListener('click', toggleTimer);
        
        // 2. Playlist Interaction
        const musicButtons = document.querySelectorAll('.grid.grid-cols-2 button');
        musicButtons.forEach(btn => {
            btn.addEventListener('click', function() {
                musicButtons.forEach(b => {
                    b.classList.remove('bg-tertiary-container/20', 'border', 'border-tertiary-container/30', 'text-tertiary', 'shadow-[0_0_12px_#00daf344]');
                    b.classList.add('bg-surface-container-highest/50', 'text-on-surface-variant');
                    b.querySelector('span').style.fontVariationSettings = "'FILL' 0";
                });
                this.classList.remove('bg-surface-container-highest/50', 'text-on-surface-variant');
                this.classList.add('bg-tertiary-container/20', 'border', 'border-tertiary-container/30', 'text-tertiary', 'shadow-[0_0_12px_#00daf344]');
                this.querySelector('span').style.fontVariationSettings = "'FILL' 1";
            });
        });
    });
</script>
