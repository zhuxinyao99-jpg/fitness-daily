<!DOCTYPE html>

<html class="dark" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>训练记录详情 - DIGITAL VANGUARD</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Manrope:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary": "#122f5f",
                        "on-tertiary-container": "#005b66",
                        "on-secondary-fixed-variant": "#404560",
                        "on-secondary": "#292f48",
                        "inverse-on-surface": "#292f48",
                        "error": "#ffb4ab",
                        "secondary-fixed": "#dde1ff",
                        "tertiary": "#9befff",
                        "tertiary-container": "#00daf3",
                        "on-primary-container": "#385283",
                        "surface-dim": "#0b1229",
                        "surface-container-high": "#222941",
                        "tertiary-fixed": "#9cf0ff",
                        "surface-bright": "#323851",
                        "outline": "#8e909a",
                        "on-surface": "#dce1ff",
                        "surface-tint": "#adc6ff",
                        "secondary-container": "#404560",
                        "background": "#0b1229",
                        "error-container": "#93000a",
                        "on-error-container": "#ffdad6",
                        "outline-variant": "#44474f",
                        "surface": "#0b1229",
                        "on-secondary-fixed": "#141a32",
                        "on-primary-fixed": "#001a42",
                        "on-error": "#690005",
                        "tertiary-fixed-dim": "#00daf3",
                        "on-tertiary-fixed-variant": "#004f58",
                        "secondary-fixed-dim": "#c0c5e5",
                        "inverse-primary": "#455e90",
                        "primary-fixed": "#d8e2ff",
                        "primary-fixed-dim": "#adc6ff",
                        "on-tertiary-fixed": "#001f24",
                        "inverse-surface": "#dce1ff",
                        "on-surface-variant": "#c4c6d0",
                        "surface-variant": "#2d344c",
                        "surface-container": "#181e36",
                        "primary": "#d8e2ff",
                        "surface-container-low": "#141a32",
                        "surface-container-lowest": "#060d24",
                        "on-tertiary": "#00363d",
                        "on-background": "#dce1ff",
                        "on-primary-fixed-variant": "#2c4677",
                        "secondary": "#c0c5e5",
                        "primary-container": "#adc6ff",
                        "on-secondary-container": "#aeb4d3",
                        "surface-container-highest": "#2d344c"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Space Grotesk"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-card {
            background: rgba(45, 52, 76, 0.4);
            backdrop-filter: blur(20px);
        }
        .kinetic-glow {
            box-shadow: 0px 24px 48px rgba(0, 229, 255, 0.08);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body selection:bg-tertiary/30">
<!-- Top Navigation AppBar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-[#0b1229]/60 backdrop-blur-xl shadow-[0px_24px_48px_rgba(0,229,255,0.08)]">
<div class="flex items-center gap-4">
<button class="hover:scale-95 transition-transform text-[#adc6ff]">
<span class="material-symbols-outlined">arrow_back_ios</span>
</button>
<h1 class="font-['Space_Grotesk'] tracking-tighter uppercase text-xl font-bold text-[#adc6ff]">杠铃深蹲</h1>
</div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-[#adc6ff]">more_horiz</span>
</div>
</header>
<main class="pt-24 pb-32 px-6 max-w-2xl mx-auto space-y-8">
<!-- Hero Metrics HUD -->
<section class="relative">
<div class="absolute -top-10 -left-10 w-40 h-40 bg-tertiary-container/10 rounded-full blur-3xl"></div>
<div class="grid grid-cols-2 gap-4 relative z-10">
<!-- Timer Card -->
<div class="glass-card p-6 rounded-xl border border-outline-variant/15 flex flex-col justify-between h-40">
<span class="text-label-sm font-bold uppercase tracking-widest text-primary-fixed-dim/60">训练计时</span>
<div class="text-display-lg font-headline font-bold -tracking-[0.02em] text-tertiary">
                        42:15
                    </div>
</div>
<!-- 1RM Estimate Card -->
<div class="glass-card p-6 rounded-xl border border-outline-variant/15 flex flex-col justify-between h-40 text-right">
<span class="text-label-sm font-bold uppercase tracking-widest text-primary-fixed-dim/60">1RM 估算</span>
<div>
<div class="text-display-lg font-headline font-bold -tracking-[0.02em] text-primary">145</div>
<span class="text-label-sm font-bold text-primary/40 uppercase">KG</span>
</div>
</div>
</div>
</section>
<!-- Data Overview Cards (Asymmetric Bento) -->
<section class="grid grid-cols-3 gap-3">
<div class="col-span-1 glass-card p-4 rounded-lg flex flex-col justify-center items-start border border-outline-variant/15">
<span class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest mb-1">总容量</span>
<span class="text-xl font-headline font-bold text-on-surface">4,200</span>
<span class="text-[10px] text-on-surface-variant font-bold">KG</span>
</div>
<div class="col-span-1 glass-card p-4 rounded-lg flex flex-col justify-center items-start border border-outline-variant/15 bg-primary-container/10">
<span class="text-[10px] font-bold text-tertiary uppercase tracking-widest mb-1">平均强度</span>
<span class="text-xl font-headline font-bold text-tertiary">85%</span>
<span class="text-[10px] text-tertiary/60 font-bold">MAX</span>
</div>
<div class="col-span-1 glass-card p-4 rounded-lg flex flex-col justify-center items-start border border-outline-variant/15">
<span class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest mb-1">平均休息</span>
<span class="text-xl font-headline font-bold text-on-surface">90</span>
<span class="text-[10px] text-on-surface-variant font-bold">SEC</span>
</div>
</section>
<!-- Set Input Area -->
<section class="space-y-4">
<div class="flex justify-between items-end px-2">
<h2 class="text-headline-md font-headline font-bold uppercase tracking-tight text-primary-fixed-dim">训练组项</h2>
<span class="text-label-sm font-bold text-on-surface-variant">RPE 训练模式已开启</span>
</div>
<!-- Set Rows -->
<div class="space-y-3">
<!-- Header Labels -->
<div class="grid grid-cols-12 gap-4 px-4 text-[10px] font-extrabold uppercase tracking-[0.2em] text-on-surface-variant/50">
<div class="col-span-2">组号</div>
<div class="col-span-4">重量 (KG)</div>
<div class="col-span-3">次数</div>
<div class="col-span-3 text-right">状态</div>
</div>
<!-- Set Card 01 (Completed) -->
<div class="grid grid-cols-12 gap-4 items-center p-4 glass-card rounded-lg border border-outline-variant/10">
<div class="col-span-2 font-headline font-bold text-on-surface-variant">01</div>
<div class="col-span-4">
<input class="w-full bg-surface-container-high border-none rounded-full px-4 py-2 text-primary font-headline font-bold focus:ring-2 focus:ring-tertiary transition-all" type="number" value="100"/>
</div>
<div class="col-span-3">
<input class="w-full bg-surface-container-high border-none rounded-full px-4 py-2 text-primary font-headline font-bold focus:ring-2 focus:ring-tertiary transition-all" type="number" value="12"/>
</div>
<div class="col-span-3 flex justify-end">
<div class="w-10 h-10 rounded-full bg-tertiary-container flex items-center justify-center text-on-tertiary-container shadow-[0_0_12px_#00daf3]">
<span class="material-symbols-outlined font-bold">check</span>
</div>
</div>
</div>
<!-- Set Card 02 (Active) -->
<div class="grid grid-cols-12 gap-4 items-center p-4 glass-card rounded-lg border-2 border-tertiary/30 bg-tertiary/5">
<div class="col-span-2 font-headline font-bold text-tertiary">02</div>
<div class="col-span-4">
<input class="w-full bg-surface-container-highest border-none rounded-full px-4 py-2 text-tertiary font-headline font-bold focus:ring-2 focus:ring-tertiary outline-none" placeholder="100" type="number"/>
</div>
<div class="col-span-3">
<input class="w-full bg-surface-container-highest border-none rounded-full px-4 py-2 text-tertiary font-headline font-bold focus:ring-2 focus:ring-tertiary outline-none" placeholder="10" type="number"/>
</div>
<div class="col-span-3 flex justify-end">
<div class="w-10 h-10 rounded-full border-2 border-tertiary/30 flex items-center justify-center text-tertiary/30 hover:border-tertiary hover:text-tertiary transition-colors cursor-pointer">
<span class="material-symbols-outlined font-bold">check</span>
</div>
</div>
</div>
<!-- Set Card 03 (Empty) -->
<div class="grid grid-cols-12 gap-4 items-center p-4 glass-card rounded-lg border border-outline-variant/10">
<div class="col-span-2 font-headline font-bold text-on-surface-variant">03</div>
<div class="col-span-4">
<input class="w-full bg-surface-container-high border-none rounded-full px-4 py-2 text-on-surface-variant font-headline font-bold focus:ring-2 focus:ring-tertiary outline-none" placeholder="--" type="number"/>
</div>
<div class="col-span-3">
<input class="w-full bg-surface-container-high border-none rounded-full px-4 py-2 text-on-surface-variant font-headline font-bold focus:ring-2 focus:ring-tertiary outline-none" placeholder="--" type="number"/>
</div>
<div class="col-span-3 flex justify-end">
<div class="w-10 h-10 rounded-full border-2 border-outline-variant/30 flex items-center justify-center text-outline-variant transition-colors">
<span class="material-symbols-outlined font-bold">check</span>
</div>
</div>
</div>
</div>
<!-- Add Set Button -->
<button class="w-full py-4 rounded-xl border border-dashed border-outline-variant/30 flex items-center justify-center gap-2 text-on-surface-variant font-bold uppercase tracking-widest hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined">add</span>
<span>添加新组项</span>
</button>
</section>
<!-- Illustration / Background Detail -->
<section class="py-6">
<div class="w-full h-48 rounded-xl overflow-hidden relative grayscale opacity-40">
<img alt="gym weightlifting" class="w-full h-full object-cover" data-alt="dramatic low angle shot of a heavy barbell in a dark professional gym with industrial lighting and blue atmospheric haze" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDsA4LoP46eIBsbacTnNJ3TIkhHRRJEy7V3YPWqDqp5jJbiOK4lwF2QzrD5_CmvLfzR84qMs0mFv0qQRt3ITfvTQDENpw_c0eNRAof4_1s0jzMXvBEPaVUNDDdwvOf3RnQcCeybDuvdLSgP-APGaYSe2rx22B5rrLJiHfd0iMoKW-t7cbJ1IvbtTMHHMMwpVQpiUIy8c-WAMrJx6n_dCQcgpcCe4hqXzfoWEcCrL3H4ex5b-k0KbjYcZlk2m02Kjrkb3EmJK1qhxHao"/>
<div class="absolute inset-0 bg-gradient-to-t from-background to-transparent"></div>
</div>
</section>
</main>
<!-- Bottom Action Button -->
<footer class="fixed bottom-0 w-full z-50 px-6 pb-8 pt-4 bg-gradient-to-t from-background via-background/95 to-transparent">
<button class="w-full bg-primary-container text-on-primary-container font-headline font-extrabold text-lg py-5 rounded-xl uppercase tracking-[0.2em] shadow-[0px_24px_48px_rgba(0,229,255,0.15)] active:scale-95 transition-all flex items-center justify-center gap-3">
<span>完成训练</span>
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">bolt</span>
</button>
</footer>
</body></html>
